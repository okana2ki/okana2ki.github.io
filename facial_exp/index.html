<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表情認識</title>
  <!-- Google Fonts: Roboto -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* CSS変数の導入 */
    :root {
      --primary-color: #2575fc;
      --secondary-color: #6a11cb;
      --header-bg: url('../tennis.JPG');
      --overlay-color: rgba(0, 0, 0, 0.5);
      --text-color: #333;
      --light-text: #666;
      --bg-color: #f9f9f9;
    }
    * {margin: 0; padding: 0; box-sizing: border-box;}
    body {font-family: 'Roboto', sans-serif; color: var(--text-color); background-color: #fff;}
    header {position: relative; text-align: center; padding: 60px 20px; background: var(--header-bg) no-repeat center/cover; color: #fff; margin-bottom: 20px;}
    header::before {content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--overlay-color); z-index: 0;}
    header h1, header p {position: relative; z-index: 1;}
    header h1 {font-size: 2rem; margin-bottom: 10px;}
    header p {font-size: 1rem;}
    nav {background: var(--primary-color);}
    nav ul {display: flex; list-style: none; justify-content: center;}
    nav ul li {margin: 0 15px;}
    nav ul li a {color: #fff; text-decoration: none; font-weight: 700; padding: 10px 15px; display: block;}
    nav ul li a:hover {background-color: rgba(255,255,255,0.2); border-radius: 4px;}
    .download-link {text-align: center; margin: 20px; font-size: 1rem;}
    .download-link a {color: var(--primary-color); text-decoration: none; font-weight: 700;}
    .download-link a:hover {text-decoration: underline;}
    .page-intro {display: flex; align-items: flex-start; gap: 20px; padding: 20px; max-width: 900px; margin: 0 auto;}
    .page-intro img {width: 200px; max-width: 100%; border-radius: 8px; object-fit: cover;}
    .page-intro .intro-text {flex: 1;}
    .page-intro h2 {font-size: 1.75rem; margin-bottom: 12px;}
    .page-intro p {font-size: 1rem; line-height: 1.7; color: var(--light-text);}
    @media (max-width: 768px) {.page-intro {flex-direction: column; align-items: stretch;}}
    @media (max-width: 480px) { nav ul {flex-direction: column;} nav ul li {margin: 5px 0;} }
    footer {text-align: center; padding: 20px; background: #f2f2f2; color: var(--text-color); font-size: 0.9rem; margin-top: 20px;}
  </style>
</head>
<body>
  <header>
    <h1>Oka Natsuki - 岡 夏樹</h1>
    <p>Welcome! ようこそ<br>（このサイトは、<a href="https://chatgpt.com/share/67f37223-6b48-8004-9f3e-045a0f3ddd6b" style="color: #fff;">生成AIで作成</a>しました）</p>
  </header>
  <nav><ul><li><a href="../index.html">Home ホーム</a></li><li><a href="https://okana2ki.wordpress.com/">About Me 私について</a></li><li><a href="https://okana2ki.wordpress.com/jp/#%E8%B3%AA%E5%95%8F%E3%83%95%E3%82%A9%E3%83%BC%E3%83%A0-1">Contact 問い合わせ</a></li></ul></nav>
  <main class="page-intro">
    <img src="../facial-exp-recognition.png" alt="顔の表情認識画像">
    <div class="intro-text">
      <h2><a href="https://teachablemachine.withgoogle.com/models/bOpabf_cP/">顔の表情認識</a></h2>
      <p><a href="https://teachablemachine.withgoogle.com/">Teachable Machine</a>で学習しました。学習データは<a href="https://www.kaggle.com/datasets/msambare/fer2013">FER-2013</a>の一部を使用。trainからhappy, sadを各500枚使用（85％: 学習, 15％: テスト）。validationからhappy, sad各100枚も合わせて、<a href="images.zip" download>ここ</a>からダウンロードできます。</p>
    </div>
  </main>
  <footer><p>&copy; 2025 Oka Natsuki. All rights reserved.</p></footer>
</body>
</html>
